<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor tags, image, videos</title>
    <!-- Anchor tags helps to use other websites in our websites -->
</head>
<body>
    <!-- to get anchor tags 'a' is used -->

    <!-- This open in same tab -->
     <a href="https://google.com">Click1: here to go to Google in same tab</a><br>

     <!-- This open in another tab -->
      <a href="https://google.com" target="_blank">Click 2:here to go to Google in another tab</a><br>


      <!-- use another file which is available in the same folder -->
       <a href="/Forth/about.html">Click3: here to goto About page in same tab</a><br>

        <a href="/Forth/about.html" target="_blank">Click4: here to goto About page in another tab</a><br>

        <img src="/Forth/student.jpg" alt="This is a student image" width="200px"><br>
        <!-- img is also self closing tag -->
        <!-- if image is not loading it will display alternate text -->
        <a href="https://learn.aajhub.in/s/courses/67defced1364e150f6f37c8d/take"><img src="/Forth/student.jpg" alt="aajhub is the best options to learn free" width="320px"></a>
        <br>

        <video src="/Forth/studentGIF.mp4" width="500px">We cannot play this video to play this we must use controls attribute</video><br>

        <video src="/Forth/studentGIF.mp4" width="500px" controls autoplay muted></video><br>

        <video src="/Forth/studentGIF.mp4" width="500px" controls autoplay loop ></video><br>
        <!-- autoplay help us to automatically start but Modern web browsers block videos from playing automatically with sound so must use "autoplay muted" -->
         <!-- loop help us to play in a loop -->



        <!-- we can also use youtube links -->
         <!-- To use youtube video goto share then copy embeded code -->
         <iframe width="560" height="315" src="https://www.youtube.com/embed/ix9cRaBkVe0?si=0AllvDRmR9rxIxXm" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen ></iframe>

         <iframe src="https://bing.com" frameborder="0"></iframe>
         
        <!-- It will create a random when we reload our html page -->
<img src="https://picsum.photos/200" alt="A random image">


<!-- iframe is different from anchor tag  -->
 <!-- anchor tag redirect us to tab but iframe use another website in our -->
</body>
</body>
</html>
