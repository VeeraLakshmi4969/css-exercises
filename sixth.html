<!doctype html>
<html>
  <head>
    <title>Block and Inline elements</title>
  </head>
  <body>
    <!-- span tag is also work similar to p tag  -->
    <!-- but span is inline element mean it occupy required space only adjust according to its width-->
    <!-- p tag is block level element it use total width  -->
    <p style="border: 2px solid black">Lorem ipsum dolor sit amet.</p>
    <p style="border: 2px solid black">Lorem ipsum dolor sit amet.</p>
    <span style="border: 2px solid black">Lorem ipsum dolor sit amet.</span>
    <span style="border: 2px solid black">Lorem ipsum dolor sit amet.</span>

    <!-- CLASSES AND IDS -->

    <!-- to create class we use .className it will create div tag automatically -->
    <!-- to create class we use #idName it will create div tag automatically -->
    <div class="container"></div>
    <div id="uniqueId"></div>
    <!-- if we want to create inside any tag we can use like p.className -->
    <!-- we can also do al things at the same time p.class#id -->
    <p class="class" id="id"></p>
  </body>
</html>
